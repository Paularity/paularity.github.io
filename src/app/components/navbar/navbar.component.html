<div class="d-flex flex-row w-100 valo-navbar">
  <div
    class="d-flex valo-menu"
    *ngFor="let menu of menus"
    (click)="clickedAudio()"
    (mouseenter)="hoveredAudio()"
    [routerLink]="menu.link"
    [routerLinkActive]="['is-active']"
  >
    <ng-container *ngIf="menu.title !== 'play'">
      <div class="regular-menu">
        <p>{{ menu.title }}</p>
      </div>
    </ng-container>
    <ng-container *ngIf="menu.title === 'play'">
      <div class="main-button">
        <span>{{ menu.title }}</span>
      </div>
    </ng-container>
    <div class="diamond"></div>
  </div>
</div>
