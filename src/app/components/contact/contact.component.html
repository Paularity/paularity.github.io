<div class="row m-0 mt-3 p-2">
  <div class="col-md-6">
    <p class="page-header">let's talk</p>
    <p class="text-light">
      Fill out the form to send me a message. Alternatively,
      send us an email to <a class="text-light font-weight-bold" href="mailto:work.christiandecembrana@gmail.com">work.christiandecembrana@gmail.com</a>.
    </p>
    <button mat-stroked-button class="valo-button mb-4" (click)="downloadResume()">
      <span>resume <i class="fa fa-download ml-3"></i></span>
    </button>
  </div>
  <div class="col-md-6">
    <form class="d-flex flex-column" #contactForm>
      <mat-form-field appearance="outline">
        <mat-label>Your Name</mat-label>
        <input matInput />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Email Address</mat-label>
        <input matInput />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Subject</mat-label>
        <input matInput />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Message</mat-label>
        <textarea matInput rows="8"></textarea>
      </mat-form-field>
    </form>
    <button mat-stroked-button class="valo-button float-right">
      <span>Send Message <i class="fa fa-angle-right ml-3"></i></span>
    </button>
  </div>
</div>
